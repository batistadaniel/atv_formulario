<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculo da media do aluno</title>
</head>
<body>
  <!-- formulario com metodo POST para enviar para o servidor -->
  <form id="form" action="http://localhost:3000/calculo" method="POST">

    <!-- for e para o id -->
    <!-- name e o que sera usado no servidor -->
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>
    <br>

    <label for="nota1">Nota 1:</label>
    <input type="number" id="nota1" name="nota1"  required>
    <br>

    <label for="nota2">Nota 2:</label>
    <input type="number" id="nota2" name="nota2"  required>
    <br>

    <!-- tipo submit para quando o form form enviado -->
    <button type="submit" id="btn-calculo">Calcular Média</button>
  </form>

  <!-- mostar a situacao do aluno -->
  <div id="situacao"></div>


  <script>
    // pega o form e o campo onde sera exibido
    const form = document.getElementById("form")
    const situacao = document.getElementById("situacao")

    // quando o formulario for enviado
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // pega os dados do formulario de forma simples 
      const dados = {
        nome: form.nome.value,
        nota1: form.nota1.value,
        nota2: form.nota2.value
      };

      // isso aqui deu trabalho pra porra, fui me guiando por um tutorial que nao dava para fazer igual, tive que pesquisar muito para entender como enviar os dados do formulario usando fetch, mas consegui kkkkk
      const response = await fetch("http://localhost:3000/calculo", {
        method: "POST",
        headers: {
          "Content-Type": "application/json" // avisa o servidor que e json
        },
        body: JSON.stringify(dados) // transforma o objeto em texto
      });

      // pega a resposta e transforma em texto
      const conteudo = await response.text();

      // insere na div de situacao
      situacao.innerHTML = conteudo;

      // mais uma frescuragem para limpar o formulario depois de enviar kkkkk
      form.reset();
    });

  </script>
</body>
</html>
